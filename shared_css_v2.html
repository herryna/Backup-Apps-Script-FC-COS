<style>
/* =========================================================
   COS DESIGN SYSTEM v2 — Session 0 Foundation
   Tokens + utility classes (prefix .u-*)
   Coexists with shared_css.html v1 — no selector conflicts.
   Dark mode: <html data-theme="dark">
========================================================= */

/* =========================================================
   1. LIGHT MODE TOKENS (default)
========================================================= */
:root {
  /* Surface */
  --surface-1: #f8fafc;
  --surface-2: #ffffff;
  --surface-3: #ffffff;
  --surface-sunken: #f1f5f9;
  --surface-overlay: rgba(15,23,42,0.4);

  /* Text */
  --text-primary: #0f172a;
  --text-secondary: #475569;
  --text-tertiary: #64748b;
  --text-disabled: #94a3b8;
  --text-inverse: #ffffff;
  --text-link: #2563eb;

  /* Border */
  --border-subtle: #f1f5f9;
  --border-default: #e2e8f0;
  --border-strong: #cbd5e1;
  --border-focus: #2563eb;

  /* Accent (primary brand) */
  --accent-primary: #2563eb;
  --accent-primary-hover: #1d4ed8;
  --accent-primary-active: #1e40af;
  --accent-primary-soft: #dbeafe;
  --accent-primary-soft-hover: #bfdbfe;
  --accent-primary-fg: #ffffff;

  /* Status: Success */
  --status-success: #059669;
  --status-success-hover: #047857;
  --status-success-soft: #d1fae5;
  --status-success-soft-fg: #065f46;

  /* Status: Warning */
  --status-warning: #d97706;
  --status-warning-hover: #b45309;
  --status-warning-soft: #fef3c7;
  --status-warning-soft-fg: #92400e;

  /* Status: Danger */
  --status-danger: #dc2626;
  --status-danger-hover: #b91c1c;
  --status-danger-soft: #fee2e2;
  --status-danger-soft-fg: #991b1b;

  /* Status: Info */
  --status-info: #2563eb;
  --status-info-soft: #dbeafe;
  --status-info-soft-fg: #1e40af;

  /* Status: Neutral */
  --status-neutral: #64748b;
  --status-neutral-soft: #f1f5f9;
  --status-neutral-soft-fg: #334155;

  /* Owner (COS domain) */
  --owner-fc: #2563eb;
  --owner-fc-soft: #dbeafe;
  --owner-fc-soft-fg: #1e40af;
  --owner-drc: #db2777;
  --owner-drc-soft: #fce7f3;
  --owner-drc-soft-fg: #9f1239;

  /* Typography */
  --font-family-base: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  --font-family-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  --fs-xs: 10px;  --fs-sm: 11px;  --fs-base: 13px;
  --fs-md: 14px;  --fs-lg: 16px;  --fs-xl: 18px;
  --fs-2xl: 22px; --fs-3xl: 28px;
  --fw-normal: 400; --fw-medium: 500; --fw-semibold: 600; --fw-bold: 700;
  --lh-tight: 1.2;  --lh-base: 1.4;   --lh-relaxed: 1.6;

  /* Spacing (4px base) */
  --space-0: 0;    --space-1: 4px;  --space-2: 8px;
  --space-3: 12px; --space-4: 16px; --space-5: 20px;
  --space-6: 24px; --space-8: 32px; --space-10: 40px; --space-12: 48px;

  /* Radius */
  --radius-sm: 4px;  --radius-md: 6px;  --radius-lg: 8px;
  --radius-xl: 12px; --radius-2xl: 16px; --radius-full: 9999px;

  /* Shadow */
  --shadow-xs: 0 1px 2px rgba(15,23,42,0.05);
  --shadow-sm: 0 1px 3px rgba(15,23,42,0.08), 0 1px 2px rgba(15,23,42,0.04);
  --shadow-md: 0 4px 6px rgba(15,23,42,0.07), 0 2px 4px rgba(15,23,42,0.04);
  --shadow-lg: 0 10px 15px rgba(15,23,42,0.08), 0 4px 6px rgba(15,23,42,0.04);
  --shadow-xl: 0 20px 25px rgba(15,23,42,0.10), 0 10px 10px rgba(15,23,42,0.04);
  --shadow-focus: 0 0 0 3px rgba(37,99,235,0.15);
  --shadow-focus-danger: 0 0 0 3px rgba(220,38,38,0.15);

  /* Transition */
  --transition-fast: 150ms ease;
  --transition-base: 200ms ease;
  --transition-slow: 300ms ease;

  /* Z-index */
  --z-dropdown: 100;   --z-sticky: 200;      --z-sidebar: 500;
  --z-topbar: 1001;    --z-modal-backdrop: 2000; --z-modal: 2001; --z-toast: 3000;
}

/* =========================================================
   2. DARK MODE TOKENS  [data-theme="dark"]
========================================================= */
[data-theme="dark"] {
  --surface-1: #0f172a;
  --surface-2: #1e293b;
  --surface-3: #334155;
  --surface-sunken: #020617;
  --surface-overlay: rgba(0,0,0,0.6);

  --text-primary: #f1f5f9;
  --text-secondary: #cbd5e1;
  --text-tertiary: #94a3b8;
  --text-disabled: #64748b;
  --text-inverse: #0f172a;
  --text-link: #60a5fa;

  --border-subtle: #1e293b;
  --border-default: #334155;
  --border-strong: #475569;
  --border-focus: #3b82f6;

  --accent-primary: #3b82f6;
  --accent-primary-hover: #60a5fa;
  --accent-primary-active: #2563eb;
  --accent-primary-soft: #1e3a8a;
  --accent-primary-soft-hover: #1e40af;
  --accent-primary-fg: #ffffff;

  --status-success: #10b981;
  --status-success-hover: #34d399;
  --status-success-soft: #064e3b;
  --status-success-soft-fg: #a7f3d0;

  --status-warning: #f59e0b;
  --status-warning-hover: #fbbf24;
  --status-warning-soft: #78350f;
  --status-warning-soft-fg: #fde68a;

  --status-danger: #ef4444;
  --status-danger-hover: #f87171;
  --status-danger-soft: #7f1d1d;
  --status-danger-soft-fg: #fecaca;

  --status-info: #3b82f6;
  --status-info-soft: #1e3a8a;
  --status-info-soft-fg: #bfdbfe;

  --status-neutral: #94a3b8;
  --status-neutral-soft: #334155;
  --status-neutral-soft-fg: #cbd5e1;

  --owner-fc: #3b82f6;
  --owner-fc-soft: #1e3a8a;
  --owner-fc-soft-fg: #bfdbfe;
  --owner-drc: #ec4899;
  --owner-drc-soft: #831843;
  --owner-drc-soft-fg: #fbcfe8;

  --shadow-xs: 0 1px 2px rgba(0,0,0,0.3);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 6px rgba(0,0,0,0.4), 0 2px 4px rgba(0,0,0,0.3);
  --shadow-lg: 0 10px 15px rgba(0,0,0,0.5), 0 4px 6px rgba(0,0,0,0.3);
  --shadow-xl: 0 20px 25px rgba(0,0,0,0.6), 0 10px 10px rgba(0,0,0,0.3);
  --shadow-focus: 0 0 0 3px rgba(59,130,246,0.25);
  --shadow-focus-danger: 0 0 0 3px rgba(239,68,68,0.25);
}

/* =========================================================
   3. TYPOGRAPHY UTILITIES
========================================================= */
.u-text-xs   { font-size: var(--fs-xs); }
.u-text-sm   { font-size: var(--fs-sm); }
.u-text-base { font-size: var(--fs-base); }
.u-text-md   { font-size: var(--fs-md); }
.u-text-lg   { font-size: var(--fs-lg); }
.u-text-xl   { font-size: var(--fs-xl); }
.u-text-2xl  { font-size: var(--fs-2xl); }
.u-text-3xl  { font-size: var(--fs-3xl); }

.u-fw-normal   { font-weight: var(--fw-normal); }
.u-fw-medium   { font-weight: var(--fw-medium); }
.u-fw-semibold { font-weight: var(--fw-semibold); }
.u-fw-bold     { font-weight: var(--fw-bold); }

.u-lh-tight   { line-height: var(--lh-tight); }
.u-lh-base    { line-height: var(--lh-base); }
.u-lh-relaxed { line-height: var(--lh-relaxed); }

.u-text-primary   { color: var(--text-primary); }
.u-text-secondary { color: var(--text-secondary); }
.u-text-tertiary  { color: var(--text-tertiary); }
.u-text-disabled  { color: var(--text-disabled); }
.u-text-inverse   { color: var(--text-inverse); }
.u-text-link      { color: var(--text-link); }
.u-text-success   { color: var(--status-success); }
.u-text-warning   { color: var(--status-warning); }
.u-text-danger    { color: var(--status-danger); }

.u-text-mono    { font-family: var(--font-family-mono); }
.u-text-upper   { text-transform: uppercase; letter-spacing: 0.4px; }
.u-text-center  { text-align: center; }
.u-text-right   { text-align: right; }
.u-text-tabular { font-variant-numeric: tabular-nums; }
.u-text-truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* =========================================================
   4. LAYOUT & SPACING UTILITIES
========================================================= */
.u-flex        { display: flex; }
.u-inline-flex { display: inline-flex; }
.u-block       { display: block; }
.u-inline-block{ display: inline-block; }
.u-grid        { display: grid; }
.u-hidden      { display: none; }

.u-flex-col    { flex-direction: column; }
.u-flex-row    { flex-direction: row; }
.u-flex-wrap   { flex-wrap: wrap; }

.u-items-center   { align-items: center; }
.u-items-start    { align-items: flex-start; }
.u-items-end      { align-items: flex-end; }
.u-items-baseline { align-items: baseline; }
.u-items-stretch  { align-items: stretch; }

.u-justify-start   { justify-content: flex-start; }
.u-justify-center  { justify-content: center; }
.u-justify-between { justify-content: space-between; }
.u-justify-end     { justify-content: flex-end; }

.u-flex-1    { flex: 1 1 0%; }
.u-flex-auto { flex: 1 1 auto; }
.u-shrink-0  { flex-shrink: 0; }

.u-gap-1 { gap: var(--space-1); }
.u-gap-2 { gap: var(--space-2); }
.u-gap-3 { gap: var(--space-3); }
.u-gap-4 { gap: var(--space-4); }
.u-gap-5 { gap: var(--space-5); }
.u-gap-6 { gap: var(--space-6); }

.u-m-0  { margin: 0; }
.u-mt-1 { margin-top: var(--space-1); } .u-mt-2 { margin-top: var(--space-2); }
.u-mt-3 { margin-top: var(--space-3); } .u-mt-4 { margin-top: var(--space-4); }
.u-mt-6 { margin-top: var(--space-6); } .u-mt-8 { margin-top: var(--space-8); }
.u-mb-1 { margin-bottom: var(--space-1); } .u-mb-2 { margin-bottom: var(--space-2); }
.u-mb-3 { margin-bottom: var(--space-3); } .u-mb-4 { margin-bottom: var(--space-4); }
.u-mb-6 { margin-bottom: var(--space-6); } .u-mb-8 { margin-bottom: var(--space-8); }

.u-p-0 { padding: 0; }
.u-p-2 { padding: var(--space-2); } .u-p-3 { padding: var(--space-3); }
.u-p-4 { padding: var(--space-4); } .u-p-6 { padding: var(--space-6); }

.u-w-full { width: 100%; }
.u-h-full { height: 100%; }
.u-min-w-0 { min-width: 0; }

.u-rounded-sm   { border-radius: var(--radius-sm); }
.u-rounded-md   { border-radius: var(--radius-md); }
.u-rounded-lg   { border-radius: var(--radius-lg); }
.u-rounded-xl   { border-radius: var(--radius-xl); }
.u-rounded-full { border-radius: var(--radius-full); }

.u-shadow-xs { box-shadow: var(--shadow-xs); }
.u-shadow-sm { box-shadow: var(--shadow-sm); }
.u-shadow-md { box-shadow: var(--shadow-md); }
.u-shadow-lg { box-shadow: var(--shadow-lg); }

/* =========================================================
   5. BADGE (.u-badge)
========================================================= */
.u-badge {
  display: inline-flex; align-items: center; gap: var(--space-1);
  padding: 2px var(--space-2);
  font-size: var(--fs-sm); font-weight: var(--fw-semibold);
  line-height: var(--lh-tight);
  border-radius: var(--radius-full);
  white-space: nowrap;
  background: var(--status-neutral-soft); color: var(--status-neutral-soft-fg);
}
.u-badge--success   { background: var(--status-success-soft); color: var(--status-success-soft-fg); }
.u-badge--warning   { background: var(--status-warning-soft); color: var(--status-warning-soft-fg); }
.u-badge--danger    { background: var(--status-danger-soft);  color: var(--status-danger-soft-fg); }
.u-badge--info      { background: var(--status-info-soft);    color: var(--status-info-soft-fg); }
.u-badge--neutral   { background: var(--status-neutral-soft); color: var(--status-neutral-soft-fg); }
.u-badge--owner-fc  { background: var(--owner-fc-soft);       color: var(--owner-fc-soft-fg); }
.u-badge--owner-drc { background: var(--owner-drc-soft);      color: var(--owner-drc-soft-fg); }

/* Solid variant — filled bg with white text (for prominent status) */
.u-badge--solid.u-badge--success { background: var(--status-success); color: #fff; }
.u-badge--solid.u-badge--warning { background: var(--status-warning); color: #fff; }
.u-badge--solid.u-badge--danger  { background: var(--status-danger);  color: #fff; }
.u-badge--solid.u-badge--info    { background: var(--status-info);    color: #fff; }

/* =========================================================
   6. BUTTON (.u-btn)
========================================================= */
.u-btn {
  display: inline-flex; align-items: center; justify-content: center; gap: var(--space-2);
  padding: 6px var(--space-4);
  font-family: inherit; font-size: var(--fs-base); font-weight: var(--fw-medium);
  line-height: var(--lh-tight);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  background: var(--surface-2); color: var(--text-primary);
  cursor: pointer;
  transition: background var(--transition-fast), border-color var(--transition-fast), transform var(--transition-fast);
  white-space: nowrap;
}
.u-btn:hover { background: var(--surface-sunken); border-color: var(--border-strong); }
.u-btn:active { transform: translateY(1px); }
.u-btn:focus-visible { outline: none; box-shadow: var(--shadow-focus); }
.u-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.u-btn--primary {
  background: var(--accent-primary); color: var(--accent-primary-fg);
  border-color: var(--accent-primary);
}
.u-btn--primary:hover {
  background: var(--accent-primary-hover); border-color: var(--accent-primary-hover);
}

.u-btn--success {
  background: var(--status-success); color: #fff; border-color: var(--status-success);
}
.u-btn--success:hover { background: var(--status-success-hover); border-color: var(--status-success-hover); }

.u-btn--danger {
  background: var(--status-danger); color: #fff; border-color: var(--status-danger);
}
.u-btn--danger:hover { background: var(--status-danger-hover); border-color: var(--status-danger-hover); }
.u-btn--danger:focus-visible { box-shadow: var(--shadow-focus-danger); }

.u-btn--ghost {
  background: transparent; border-color: transparent; color: var(--text-secondary);
}
.u-btn--ghost:hover { background: var(--surface-sunken); color: var(--text-primary); }

.u-btn--sm { padding: 4px var(--space-3); font-size: var(--fs-sm); }
.u-btn--lg { padding: var(--space-2) var(--space-5); font-size: var(--fs-md); }
.u-btn--block { display: flex; width: 100%; }

/* =========================================================
   7. CARD (.u-card)
========================================================= */
.u-card {
  background: var(--surface-2);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
}
.u-card--flat { box-shadow: none; }
.u-card--elevated { box-shadow: var(--shadow-md); }

.u-card__header {
  padding: var(--space-3) var(--space-4);
  border-bottom: 1px solid var(--border-subtle);
  background: var(--surface-2);
  display: flex; align-items: center; justify-content: space-between;
  gap: var(--space-3);
}
.u-card__title {
  font-size: var(--fs-md); font-weight: var(--fw-semibold);
  color: var(--text-primary); margin: 0;
}
.u-card__body { padding: var(--space-4); }
.u-card__footer {
  padding: var(--space-3) var(--space-4);
  border-top: 1px solid var(--border-subtle);
  background: var(--surface-sunken);
}

/* =========================================================
   8. FORM INPUT (.u-input)
========================================================= */
.u-input,
.u-select,
.u-textarea {
  display: block; width: 100%;
  padding: 6px var(--space-3);
  font-family: inherit; font-size: var(--fs-base);
  line-height: var(--lh-base);
  color: var(--text-primary);
  background: var(--surface-2);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
}
.u-input:hover, .u-select:hover, .u-textarea:hover { border-color: var(--border-strong); }
.u-input:focus, .u-select:focus, .u-textarea:focus {
  outline: none;
  border-color: var(--border-focus);
  box-shadow: var(--shadow-focus);
}
.u-input:disabled, .u-select:disabled, .u-textarea:disabled {
  background: var(--surface-sunken); color: var(--text-disabled); cursor: not-allowed;
}
.u-input::placeholder, .u-textarea::placeholder { color: var(--text-disabled); }

.u-input--error { border-color: var(--status-danger); }
.u-input--error:focus { box-shadow: var(--shadow-focus-danger); }

.u-label {
  display: block;
  font-size: var(--fs-sm); font-weight: var(--fw-medium);
  color: var(--text-secondary);
  margin-bottom: var(--space-1);
}
.u-label--required::after {
  content: " *"; color: var(--status-danger);
}
.u-hint {
  display: block;
  font-size: var(--fs-xs); color: var(--text-tertiary);
  margin-top: var(--space-1);
}
.u-hint--error { color: var(--status-danger); }

/* =========================================================
   9. TABLE (.u-table)
========================================================= */
.u-table {
  width: 100%; border-collapse: collapse;
  font-size: var(--fs-base); background: var(--surface-2);
}
.u-table th {
  text-align: left; padding: var(--space-2) var(--space-3);
  font-size: var(--fs-sm); font-weight: var(--fw-semibold);
  color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.3px;
  background: var(--surface-sunken);
  border-bottom: 1px solid var(--border-default);
  white-space: nowrap;
}
.u-table td {
  padding: var(--space-2) var(--space-3);
  border-bottom: 1px solid var(--border-subtle);
  color: var(--text-primary);
  vertical-align: middle;
}
.u-table tr:last-child td { border-bottom: 0; }
.u-table tbody tr:hover { background: var(--surface-sunken); }
.u-table--compact th,
.u-table--compact td { padding: var(--space-1) var(--space-2); font-size: var(--fs-sm); }

/* =========================================================
   10. MODAL (.u-modal)
========================================================= */
.u-modal-backdrop {
  position: fixed; inset: 0;
  background: var(--surface-overlay);
  z-index: var(--z-modal-backdrop);
  display: flex; align-items: center; justify-content: center;
  padding: var(--space-4);
}
.u-modal {
  background: var(--surface-3);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-xl);
  max-width: 560px; width: 100%;
  max-height: 90vh; overflow: hidden;
  display: flex; flex-direction: column;
  z-index: var(--z-modal);
}
.u-modal--sm { max-width: 400px; }
.u-modal--lg { max-width: 800px; }
.u-modal__header {
  padding: var(--space-4) var(--space-5);
  border-bottom: 1px solid var(--border-subtle);
  display: flex; align-items: center; justify-content: space-between;
}
.u-modal__title { font-size: var(--fs-lg); font-weight: var(--fw-semibold); color: var(--text-primary); margin: 0; }
.u-modal__close {
  background: transparent; border: 0; padding: var(--space-1);
  font-size: var(--fs-xl); color: var(--text-tertiary);
  cursor: pointer; border-radius: var(--radius-md);
}
.u-modal__close:hover { background: var(--surface-sunken); color: var(--text-primary); }
.u-modal__body { padding: var(--space-5); overflow-y: auto; flex: 1; }
.u-modal__footer {
  padding: var(--space-3) var(--space-5);
  border-top: 1px solid var(--border-subtle);
  background: var(--surface-sunken);
  display: flex; justify-content: flex-end; gap: var(--space-2);
}

/* =========================================================
   11. TOAST (.u-toast) — simple notification
========================================================= */
.u-toast {
  position: fixed; bottom: var(--space-6); right: var(--space-6);
  padding: var(--space-3) var(--space-4);
  background: var(--surface-3); color: var(--text-primary);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-lg);
  z-index: var(--z-toast);
  font-size: var(--fs-base);
}
.u-toast--success { border-left: 3px solid var(--status-success); }
.u-toast--warning { border-left: 3px solid var(--status-warning); }
.u-toast--danger  { border-left: 3px solid var(--status-danger); }

/* =========================================================
   12. DIVIDER / MISC
========================================================= */
.u-divider {
  height: 1px; background: var(--border-default);
  border: 0; margin: var(--space-4) 0;
}
.u-divider--vertical {
  width: 1px; height: auto; align-self: stretch; margin: 0 var(--space-3);
}

.u-dot {
  display: inline-block; width: 8px; height: 8px;
  border-radius: var(--radius-full);
  background: var(--status-neutral);
}
.u-dot--success { background: var(--status-success); }
.u-dot--warning { background: var(--status-warning); }
.u-dot--danger  { background: var(--status-danger); }
.u-dot--pulse   { animation: u-pulse 1.5s infinite; }

@keyframes u-pulse {
