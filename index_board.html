<!DOCTYPE html>
<html>
<head>
<base target="_top">
<meta charset="utf-8">
<title><?= pageTitle ?></title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<?!= include('shared_css'); ?>
<style>
  /* Standalone board layout - tanpa sidebar */
  .standalone-main {
    padding: 16px;
    height: calc(100vh - 56px);
    overflow: auto;
  }
  .topbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .mode-badge {
    font-size: 12px;
    color: rgba(255,255,255,0.85);
    background: rgba(34, 197, 94, 0.15);
    border: 1px solid rgba(34, 197, 94, 0.5);
    padding: 4px 10px;
    border-radius: 4px;
    font-variant-numeric: tabular-nums;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .refresh-btn {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.35);
    color: #fff;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
  }
  .refresh-btn:hover  { background: rgba(255,255,255,0.28); }
  .refresh-btn:active { transform: scale(0.97); }
  .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>

<div class="app">

  <header class="topbar">
    <h1><i class="ti <?= pageIcon ?>"></i> <?= pageTitle ?></h1>
    <div class="topbar-right">
      <span class="mode-badge" title="Refresh manual — klik tombol Refresh untuk muat ulang halaman">
        <i class="ti ti-hand-click"></i> Manual mode
      </span>
      <button class="refresh-btn" id="refresh-btn" onclick="refreshBoard()" title="Muat ulang seluruh halaman board dari server">
        <i class="ti ti-refresh" id="refresh-icon"></i> Reload Page
      </button>
      <div id="conn-status" class="conn loading">
        <i class="ti ti-loader spin-anim"></i>
      </div>
    </div>
  </header>

  <main id="main-content" class="standalone-main">
    <div class="loading"><i class="ti ti-loader" style="animation:spin 1s linear infinite"></i> Memuat board...</div>
  </main>

</div>

<div id="toast" class="toast"></div>

<?!= include('shared_js'); ?>

<script>
// ============================================================
// STANDALONE BOARD WRAPPER — MANUAL REFRESH ONLY
// ============================================================
// [FIX 2026-07-08] Hapus auto-refresh polling.
// Sebelumnya: setInterval per 60 detik memanggil loadBoard() → re-execute
// semua <script> tag halaman target → memicu overlay "Update Data,
// Mohon Tunggu..." di board child (SHR/CTL/SLT).
// Sekarang: hanya load sekali saat pertama buka + tombol manual Reload Page.
// ============================================================
var TARGET_PAGE = '<?= targetPage ?>';
var isLoading   = false;

function loadBoard() {
  if (isLoading) return;
  isLoading = true;

  var main = document.getElementById('main-content');
  var icon = document.getElementById('refresh-icon');
  var btn  = document.getElementById('refresh-btn');

  icon.style.animation = 'spin 1s linear infinite';
  btn.disabled = true;

  google.script.run
    .withSuccessHandler(function(html) {
      main.innerHTML = html;

      // Re-execute <script> tags di dalam halaman target
      var scripts = main.querySelectorAll('script');
      scripts.forEach(function(s) {
        var ns = document.createElement('script');
        if (s.src) ns.src = s.src;
        else ns.textContent = s.textContent;
        document.body.appendChild(ns);
        s.remove();
      });

      icon.style.animation = '';
      btn.disabled = false;
      isLoading = false;
    })
    .withFailureHandler(function(err) {
      main.innerHTML = '<div class="loading" style="color:#A32D2D">Error: ' + err.message + '</div>';
      icon.style.animation = '';
      btn.disabled = false;
      isLoading = false;
    })
    .getPageContent(TARGET_PAGE);
}

function refreshBoard() {
  loadBoard();
}

// Cek koneksi DB (sekali saat load)
google.script.run
  .withSuccessHandler(function() {
    var conn = document.getElementById('conn-status');
    conn.className = 'conn ok';
    conn.innerHTML = '<i class="ti ti-circle-check"></i> Connected';
  })
  .withFailureHandler(function(err) {
    var conn = document.getElementById('conn-status');
    conn.className = 'conn err';
    conn.innerHTML = '<i class="ti ti-x"></i> Error';
  })
  .getSheetData('M_ITEM');

// Initial load (sekali) — TIDAK ada startCountdown() lagi
loadBoard();
</script>

</body>
</html>
